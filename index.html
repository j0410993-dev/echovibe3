<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoVibe | Welcome</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f12; color: #e4e4e7; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; }
        
        /* Shared Container Elements */
        .card-panel {
            width: 100%; max-width: 420px; background: #18181b; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #27272a; overflow: hidden;
        }

        /* Auth Screen Styles */
        .auth-box { padding: 30px 24px; display: flex; flex-direction: column; gap: 20px; }
        .auth-header { text-align: center; margin-bottom: 10px; }
        .auth-header h2 { font-size: 1.8rem; color: #a855f7; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 6px;}
        .auth-header p { font-size: 0.85rem; color: #a1a1aa; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.85rem; color: #a1a1aa; font-weight: 500; }
        
        input { padding: 14px; background: #0f0f12; border: 1px solid #3f3f46; border-radius: 8px; color: white; outline: none; font-size: 0.95rem; width: 100%; }
        input:focus { border-color: #a855f7; }
        
        .auth-btn { background: #a855f7; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: background 0.2s; width: 100%; margin-top: 10px; }
        .auth-btn:hover { background: #9333ea; }
        
        .auth-toggle { text-align: center; font-size: 0.85rem; color: #a1a1aa; margin-top: 5px; }
        .auth-toggle span { color: #a855f7; cursor: pointer; font-weight: 600; text-decoration: underline; }
        .error-lbl { color: #f43f5e; font-size: 0.85rem; text-align: center; display: none; font-weight: 500; }

        /* Main App Interface Panel */
        .chat-container { max-width: 500px; height: 85vh; display: none; flex-direction: column; }
        .chat-header { background: #202024; padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #27272a; }
        .logo { font-weight: 800; font-size: 1.25rem; color: #a855f7; }
        .status { font-size: 0.85rem; background: #27272a; padding: 4px 10px; border-radius: 20px; color: #a1a1aa; }
        .status span { color: #22c55e; font-weight: bold; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.me { align-self: flex-end; }
        .msg-wrapper.others { align-self: flex-start; }
        
        .username { font-size: 0.75rem; color: #a1a1aa; margin-bottom: 4px; padding-left: 4px; }
        .me .username { text-align: right; padding-right: 4px; }
        .message { padding: 10px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
